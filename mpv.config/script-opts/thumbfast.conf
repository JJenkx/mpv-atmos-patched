# Socket path (leave empty for auto)
socket=

# Thumbnail path (leave empty for auto)
thumbnail=

# Maximum thumbnail size in pixels (scaled down to fit)
# Values are scaled when hidpi is enabled
max_height=800
max_width=800

# Apply tone-mapping, no to disable
#tone_mapping=no
tone_mapping=no


# Overlay id
overlay_id=42

# Spawn thumbnailer on file load for faster initial thumbnails
spawn_first=no

# Close thumbnailer process after an inactivity period in seconds, 0 to disable
quit_after_inactivity=0

# Enable on network playback
network=no

# Enable on audio playback
audio=no

# Enable hardware decoding
hwdec=no

# Generate thumbnails from mpv's in-memory demuxer cache via the built-in
# thumbnail-cache command (requires the thumbnail_cache mpv patch) instead of
# spawning a second mpv. No subprocess fork (avoids the spdif-underrun wedge)
# and no extra network I/O; only already-buffered seek positions get a
# thumbnail. Falls back to the subprocess thumbnailer if the command is absent.
cache_backend=yes

# Windows only: use native Windows API to write to pipe (requires LuaJIT)
direct_io=no

# Custom path to the mpv executable.
# Left empty: thumbfast spawns `mpv` from PATH, which mpv_patched.sh points at
# the portable binary — keeps this relocatable. Set an absolute path if needed.
mpv_path=
name: build-release

# Builds the 2 variants (stock / enhanced) x 2 platforms (Linux / Windows) in an
# Arch Linux container, then publishes them to a GitHub Release with signed
# build-provenance attestations.
#
# Trigger:
#   - push a tag like v0.1.0  -> builds everything and publishes a Release
#   - manual (Actions -> Run workflow) -> pick platform/variant subset; set
#     "release" true to also publish (needs a tag-less prerelease name).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      platform:
        description: Platforms to build
        type: choice
        options: [all, linux, windows]
        default: all
      variant:
        description: Variants to build
        type: choice
        options: [all, stock, enhanced]
        default: all
      runner:
        description: Where to build
        type: choice
        options: [github, self-hosted]
        default: github

permissions:
  contents: write        # create releases
  id-token: write        # provenance attestation
  attestations: write    # provenance attestation

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Compute the build matrix from the dispatch inputs (full matrix on tag) ──
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        shell: bash
        run: |
          plat="${{ github.event.inputs.platform || 'all' }}"
          vari="${{ github.event.inputs.variant || 'all' }}"
          # Linux builds in an Ubuntu 22.04 container (glibc 2.35 floor -> runs on
          # ~2022+ distros). Windows cross-build stays on Arch (mingw-w64 packages).
          items=()
          for p in linux windows; do
            case "$p" in
              linux)   c="ubuntu:22.04" ;;
              windows) c="archlinux:latest" ;;
            esac
            for v in stock enhanced; do
              if [[ ( "$plat" == all || "$plat" == "$p" ) && ( "$vari" == all || "$vari" == "$v" ) ]]; then
                items+=("{\"platform\":\"$p\",\"variant\":\"$v\",\"container\":\"$c\"}")
              fi
            done
          done
          IFS=,
          echo "matrix={\"include\":[${items[*]}]}" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    runs-on: ${{ (github.event.inputs.runner == 'self-hosted') && fromJSON('["self-hosted"]') || 'ubuntu-latest' }}
    container: ${{ matrix.container }}
    timeout-minutes: 350
    env:
      VARIANT: ${{ matrix.variant }}
      DISTRIBUTABLE: '1'
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Bootstrap base tools (needed for checkout)
        run: |
          if command -v apt-get >/dev/null; then
            apt-get update -qq
            apt-get install -y --no-install-recommends \
              git ca-certificates tar xz-utils zip \
              squashfs-tools desktop-file-utils file
          else
            pacman -Syu --noconfirm --needed git tar xz zip
          fi

      - uses: actions/checkout@v4

      - name: Record upstream refs
        id: refs
        shell: bash
        run: |
          mpv_ref=$(git ls-remote https://github.com/mpv-player/mpv.git HEAD | cut -f1)
          ff_ref=$(git ls-remote https://github.com/FFmpeg/FFmpeg.git HEAD | cut -f1)
          echo "mpv=$mpv_ref"  >> "$GITHUB_OUTPUT"
          echo "ffmpeg=$ff_ref" >> "$GITHUB_OUTPUT"
          echo "Building mpv=$mpv_ref ffmpeg=$ff_ref"

      # ── Linux ────────────────────────────────────────────────────────────────
      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: ./build_mpv.sh

      - name: Package Linux tarball + AppImage
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -Eeuo pipefail
          name="mpv-atmos-${VARIANT}-linux-x86_64"
          top="$name"
          rm -rf "$top" dist && mkdir -p dist

          # Record the exact upstream versions this binary was built from.
          ./scripts/build_info.sh mpv linux "$VARIANT" "${GITHUB_SHA:0:7}" > /tmp/buildinfo.txt
          cat /tmp/buildinfo.txt
          cp /tmp/buildinfo.txt "dist/BUILD-INFO-linux-${VARIANT}.txt"

          # Relocatable payload: bin/lib/share only (drop build-only trees).
          mkdir -p "$top"
          cp -a mpv/bin "$top/bin"
          cp -a mpv/lib "$top/lib"
          cp -a mpv/share "$top/share"
          rm -rf "$top/lib/pkgconfig" "$top/share/man" "$top/include" || true
          # NEVER bundle the Vulkan loader: it is driver-coupled. Ours would shadow
          # the system loader via RUNPATH and then fail to find the machine's GPU
          # driver ICDs ("no suitable device"). The system loader must be used.
          rm -f "$top"/lib/libvulkan.so*
          # strip debug info
          find "$top/bin" "$top/lib" -type f \( -name '*.so*' -o -executable \) \
            -exec strip --strip-unneeded {} + 2>/dev/null || true
          cp /tmp/buildinfo.txt "$top/BUILD-INFO.txt"
          # bundle config (curated per variant) + a wrapper that guarantees it is used
          cp -a mpv.config "$top/portable_config"
          ./scripts/assemble_dist_config.sh "$top/portable_config" "$VARIANT" linux
          cat > "$top/mpv" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          # Our bundled OpenSSL ships no CA store. Prefer the system trust store
          # (your distro keeps it current); fall back to the bundle we ship.
          if [ -z "${SSL_CERT_FILE:-}" ]; then
            for _ca in /etc/ssl/certs/ca-certificates.crt \
                       /etc/pki/tls/certs/ca-bundle.crt \
                       /etc/ssl/ca-bundle.pem /etc/ssl/cert.pem; do
              [ -r "$_ca" ] && SSL_CERT_FILE="$_ca" && break
            done
            [ -z "${SSL_CERT_FILE:-}" ] && [ -r "$HERE/portable_config/cacert.pem" ] \
              && SSL_CERT_FILE="$HERE/portable_config/cacert.pem"
            [ -n "${SSL_CERT_FILE:-}" ] && export SSL_CERT_FILE
          fi
          [ -z "${SSL_CERT_DIR:-}" ] && [ -d /etc/ssl/certs ] && export SSL_CERT_DIR=/etc/ssl/certs
          exec "$HERE/bin/mpv" --config-dir="$HERE/portable_config" "$@"
          EOF
          chmod +x "$top/mpv"

          tar -cJf "dist/$name.tar.xz" "$top"
          echo "== tarball ==" && ls -lh "dist/$name.tar.xz"

          # ── AppImage ──
          appdir=AppDir
          rm -rf "$appdir"; mkdir -p "$appdir/usr"
          cp -a mpv/bin "$appdir/usr/bin"
          cp -a mpv/lib "$appdir/usr/lib"
          cp -a mpv/share "$appdir/usr/share"
          rm -rf "$appdir/usr/lib/pkgconfig" || true
          # Driver-coupled: must come from the host, never the bundle (see above).
          rm -f "$appdir"/usr/lib/libvulkan.so*
          find "$appdir/usr/bin" "$appdir/usr/lib" -type f \( -name '*.so*' -o -executable \) \
            -exec strip --strip-unneeded {} + 2>/dev/null || true
          cp /tmp/buildinfo.txt "$appdir/BUILD-INFO.txt"
          cp -a mpv.config "$appdir/usr/portable_config"
          ./scripts/assemble_dist_config.sh "$appdir/usr/portable_config" "$VARIANT" linux
          cat > "$appdir/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          # Our bundled OpenSSL ships no CA store. Prefer the system trust store;
          # fall back to the bundle we ship.
          if [ -z "${SSL_CERT_FILE:-}" ]; then
            for _ca in /etc/ssl/certs/ca-certificates.crt \
                       /etc/pki/tls/certs/ca-bundle.crt \
                       /etc/ssl/ca-bundle.pem /etc/ssl/cert.pem; do
              [ -r "$_ca" ] && SSL_CERT_FILE="$_ca" && break
            done
            [ -z "${SSL_CERT_FILE:-}" ] && [ -r "$HERE/usr/portable_config/cacert.pem" ] \
              && SSL_CERT_FILE="$HERE/usr/portable_config/cacert.pem"
            [ -n "${SSL_CERT_FILE:-}" ] && export SSL_CERT_FILE
          fi
          [ -z "${SSL_CERT_DIR:-}" ] && [ -d /etc/ssl/certs ] && export SSL_CERT_DIR=/etc/ssl/certs
          exec "$HERE/usr/bin/mpv" --config-dir="$HERE/usr/portable_config" "$@"
          EOF
          chmod +x "$appdir/AppRun"
          # desktop + icon (reuse mpv's own if present)
          if [ -f "$appdir/usr/share/applications/mpv.desktop" ]; then
            cp "$appdir/usr/share/applications/mpv.desktop" "$appdir/mpv.desktop"
          else
            printf '[Desktop Entry]\nType=Application\nName=mpv (Atmos %s)\nExec=mpv %%U\nIcon=mpv\nCategories=AudioVideo;Player;\nTerminal=false\n' "$VARIANT" > "$appdir/mpv.desktop"
          fi
          icon=$(find "$appdir/usr/share/icons" -name 'mpv.png' | sort | tail -1 || true)
          [ -n "$icon" ] && cp "$icon" "$appdir/mpv.png" && cp "$icon" "$appdir/.DirIcon" || true

          curl -fsSL -o /tmp/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 /tmp/appimagetool "$appdir" "dist/$name.AppImage"
          echo "== AppImage ==" && ls -lh "dist/$name.AppImage"

      # ── Windows (mingw-w64 cross) ─────────────────────────────────────────────
      - name: Install mingw-w64 toolchain (Windows)
        if: matrix.platform == 'windows'
        run: |
          set -e
          pacman -S --noconfirm --needed \
            mingw-w64-gcc mingw-w64-binutils mingw-w64-crt mingw-w64-headers \
            mingw-w64-winpthreads \
            base-devel git curl cmake meson ninja pkgconf nasm yasm python-jinja
          # gendef (needed for LuaJIT's import lib) ships in mingw-w64-tools, which
          # is AUR-only on Arch and so unavailable in this container. It's a small
          # autotools program in the mingw-w64 source tree — build it from source.
          if ! command -v gendef >/dev/null 2>&1; then
            echo "==> Building gendef from mingw-w64 source ..."
            git clone --depth 1 https://github.com/mingw-w64/mingw-w64.git /tmp/mw64
            cd /tmp/mw64/mingw-w64-tools/gendef
            [ -x ./configure ] || autoreconf -fi
            ./configure --prefix=/usr/local
            make -j"$(nproc)"
            make install
          fi
          command -v gendef >/dev/null 2>&1 && echo "gendef: $(command -v gendef)" \
            || { echo "!! gendef still missing"; exit 1; }
          # dav1d/libplacebo look for `llvm-dlltool` first, then a plain `dlltool`.
          # Arch's mingw-w64-binutils only ships the target-prefixed dlltool, and a
          # bare symlink to it breaks: GNU dlltool shells out to plain `as`, which
          # is the HOST (ELF) assembler and cannot represent PE relocs
          # (BFD_RELOC_RVA). So install llvm (self-contained llvm-dlltool) AND
          # provide a correct `dlltool` wrapper that forces the mingw assembler.
          pacman -S --noconfirm --needed llvm
          printf '#!/bin/sh\nexec /usr/bin/x86_64-w64-mingw32-dlltool -S /usr/bin/x86_64-w64-mingw32-as "$@"\n' \
            > /usr/local/bin/dlltool
          chmod +x /usr/local/bin/dlltool
          echo "llvm-dlltool: $(command -v llvm-dlltool)"
          echo "dlltool: $(command -v dlltool)"

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        run: |
          ./build_mpv_windows.sh
          ./collect_dlls.sh

      - name: Package Windows zip
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          set -Eeuo pipefail
          name="mpv-atmos-${VARIANT}-windows-x86_64"
          rm -rf dist && mkdir -p dist
          test -d dist-win || { echo "!! dist-win/ not produced by collect_dlls.sh"; ls -la; exit 1; }

          # Record the exact upstream versions this binary was built from.
          ./scripts/build_info.sh mpv-win windows "$VARIANT" "${GITHUB_SHA:0:7}" > /tmp/buildinfo.txt
          cat /tmp/buildinfo.txt
          cp /tmp/buildinfo.txt "dist/BUILD-INFO-windows-${VARIANT}.txt"
          cp /tmp/buildinfo.txt dist-win/BUILD-INFO.txt

          ./scripts/assemble_dist_config.sh dist-win/portable_config "$VARIANT" windows
          ( cd dist-win && zip -r -9 "../dist/$name.zip" . )
          echo "== zip ==" && ls -lh "dist/$name.zip"

      # ── Provenance + upload ────────────────────────────────────────────────────
      # Build-provenance attestation only works on PUBLIC repos (GitHub rejects it
      # for user-owned private repos). Keep it non-blocking so private/debug builds
      # still produce artifacts; it starts signing automatically once the repo is
      # public, which is the state real releases are cut in.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        continue-on-error: true
        with:
          subject-path: 'dist/*'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mpv-atmos-${{ matrix.platform }}-${{ matrix.variant }}
          path: dist/*
          if-no-files-found: error

  # ── Publish a Release (only on tag pushes) ──
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List assets
        run: ls -lhR artifacts

      - name: Compose release notes (upstream versions)
        shell: bash
        run: |
          set -Eeuo pipefail
          test -n "$(ls artifacts/BUILD-INFO-*.txt 2>/dev/null)" \
            || { echo "!! no BUILD-INFO files — cannot state upstream versions"; exit 1; }
          {
            echo "Portable, self-contained **mpv with TrueHD/Dolby Atmos (MAT) passthrough**."
            echo "Linux (AppImage + tar.xz) and Windows (portable zip), in **stock** and **enhanced** variants."
            echo
            echo "### Upstream sources this release was built from"
            echo
            echo '```'
            for f in artifacts/BUILD-INFO-*.txt; do
              echo "[$(basename "$f" .txt | sed 's/^BUILD-INFO-//')]"
              grep -E '^ +(mpv|FFmpeg|libplacebo):' "$f" || true
              echo
            done
            echo '```'
            echo
            echo "Every download also ships a \`BUILD-INFO.txt\` containing the same record, so you can"
            echo "verify offline exactly which upstream commits your binary was compiled from."
            echo
            echo "### Notes"
            echo "- **TrueHD/Atmos passthrough ships OFF** and needs one deliberate step: run"
            echo "  \`mpv --audio-device=help\`, put your HDMI/AVR device in \`audio-device=\` in"
            echo "  \`portable_config/mpv.conf\`, then uncomment the audio block. **Do not enable it"
            echo "  without setting the device** — exclusive-mode spdif aimed at the wrong output can"
            echo "  hang the machine. No receiver? Change nothing; you get normal PCM audio."
            echo "- The **enhanced** build adds parallel segmented downloading, next-file prefetch and"
            echo "  unselected-track caching. See [TUNING.md](https://github.com/JJenkx/mpv-atmos-patched/blob/main/TUNING.md)"
            echo "  for what the flags do and how to size the caches without running out of RAM."
          } > NOTES.md
          cat NOTES.md

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: NOTES.md
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Tags like v0.1.0-rc1 publish as a prerelease (dress rehearsals);
          # a plain v0.1.0 publishes as the real thing.
          prerelease: ${{ contains(github.ref_name, '-rc') }}

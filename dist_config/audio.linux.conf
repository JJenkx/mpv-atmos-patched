
# ══════════════════════════════════════════════════════════════════════════════
#  TrueHD / Atmos passthrough (Linux / ALSA)  —  OFF until you set your device
# ══════════════════════════════════════════════════════════════════════════════
#  This is the whole point of this build: bitstream HD audio (TrueHD/Atmos MAT,
#  DTS-HD, E-AC3, AC3, DTS) untouched to an AVR / soundbar over HDMI.
#
#  ⚠  DO NOT just uncomment these lines. You MUST also set `audio-device` below.
#     Exclusive-mode spdif aimed at the wrong device (your default DAC, onboard
#     audio, headphones...) can wedge the ALSA driver in an unkillable state and
#     HANG YOUR SYSTEM — badly enough that even a reboot may not complete.
#     Passthrough to the system default device does not work anyway: your AVR is
#     almost never the default ALSA device.
#
#  TO ENABLE ATMOS PASSTHROUGH — do all three:
#    1. Find your HDMI/AVR device:
#         mpv --audio-device=help     # e.g. 'alsa/hdmi:CARD=HDMI,DEV=0'
#         aplay -L                    # ALSA names (the part after 'alsa/')
#         aplay -l                    # card/device numbers -> alsa/hw:<card>,<dev>
#         pactl list sinks short      # PipeWire/Pulse sinks
#    2. Put it in the audio-device line below (keep the quotes).
#    3. Uncomment every line in this block.
#
#  Leave it all commented (the default) for normal PCM audio through your usual
#  sound server — which is what you want if you don't have a receiver.
# ──────────────────────────────────────────────────────────────────────────────
#audio-device='alsa/hdmi:CARD=HDMI,DEV=0'   # <-- YOUR device. Required.
#ao=alsa
#audio-channels=7.1,5.1,stereo
#audio-exclusive=yes
#audio-spdif=ac3,dts,eac3,dts-hd,truehd
#audio-buffer=0.5

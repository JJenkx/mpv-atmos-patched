
# ── TrueHD / Atmos passthrough (Linux / ALSA) — ENABLED BY DEFAULT ─────────────
# This build bitstreams HD audio (TrueHD/Atmos MAT, DTS-HD, E-AC3, AC3, DTS)
# untouched to an AVR/soundbar over HDMI. ALSA *exclusive* mode is required for
# untouched spdif/MAT bitstreaming, so it is on (this bypasses PipeWire/Pulse and
# talks to the hardware device directly).
#
# >>> NO RECEIVER? (plain speakers, headphones, laptop, TV audio)
# >>> Passthrough will not work and you may get NO SOUND. Comment out the four
# >>> lines below (put a # in front of ao=, audio-exclusive=, audio-spdif= and
# >>> audio-buffer=) to get normal PCM output through your usual sound server.
ao=alsa
audio-channels=7.1,5.1,stereo
# Pick YOUR audio output device, then uncomment audio-device. Ways to find its
# mpv name:
#   mpv --audio-device=help    # every device mpv can see, e.g. 'alsa/hdmi:CARD=HDMI,DEV=0'
#   aplay -L                   # ALSA device names (the part after 'alsa/')
#   aplay -l                   # card/device numbers -> alsa/hw:<card>,<dev>
#   pactl list sinks short     # PipeWire/PulseAudio sinks -> 'pulse/<sink-name>'
# Leave commented to use the default ALSA device (often NOT your HDMI/AVR out —
# for passthrough you almost certainly want to set this to your HDMI device).
#audio-device='alsa/hdmi:CARD=HDMI,DEV=0'
audio-exclusive=yes
audio-spdif=ac3,dts,eac3,dts-hd,truehd
audio-buffer=0.5

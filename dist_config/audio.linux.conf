
# ── TrueHD / Atmos passthrough (Linux / ALSA) — OPTIONAL, disabled by default ──
# Uncomment this block to bitstream HD audio (TrueHD/Atmos MAT, DTS-HD, E-AC3,
# AC3, DTS) untouched to an AVR/soundbar over HDMI. This needs a passthrough-
# capable device in exclusive mode. Leave it commented for normal PCM output on
# ordinary speakers/headphones (the default, which works everywhere).
#ao=alsa
#audio-channels=7.1,5.1,stereo
# Pick YOUR audio output device, then uncomment audio-device. Ways to find its
# mpv name:
#   mpv --audio-device=help    # every device mpv can see, e.g. 'alsa/hdmi:CARD=HDMI,DEV=0'
#   aplay -L                   # ALSA device names (the part after 'alsa/')
#   aplay -l                   # card/device numbers -> alsa/hw:<card>,<dev>
#   pactl list sinks short     # PipeWire/PulseAudio sinks -> 'pulse/<sink-name>'
# Leave commented to use the system default output.
#audio-device='alsa/hdmi:CARD=HDMI,DEV=0'
#audio-exclusive=yes
#audio-spdif=ac3,dts,eac3,dts-hd,truehd
#audio-buffer=0.5

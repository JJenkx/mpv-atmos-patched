
# ══════════════════════════════════════════════════════════════════════════════
#  TrueHD / Atmos passthrough (Linux / ALSA)  —  OFF until you set your device
# ══════════════════════════════════════════════════════════════════════════════
#  This is the whole point of this build: bitstream HD audio (TrueHD/Atmos MAT,
#  DTS-HD, E-AC3, AC3, DTS) untouched to an AVR / soundbar over HDMI.
#
#  ⚠  DO NOT just uncomment these lines. You MUST also set `audio-device` below.
#     Exclusive-mode spdif aimed at the wrong device (your default DAC, onboard
#     audio, headphones...) can wedge the ALSA driver in an unkillable state and
#     HANG YOUR SYSTEM — badly enough that even a reboot may not complete.
#     Passthrough to the system default device does not work anyway: your AVR is
#     almost never the default ALSA device.
#
#  ── STEP 1: find your receiver's device name ─────────────────────────────────
#  In a terminal, cd into the folder you extracted, and list the audio devices:
#
#      cd ~/Downloads/mpv-atmos-enhanced-linux-x86_64
#      ./mpv --audio-device=help
#
#  Other ways to find it, if the mpv names are unclear:
#      aplay -L                 # ALSA device names (the part after 'alsa/')
#      aplay -l                 # card/device numbers -> alsa/hw:<card>,<dev>
#      pactl list sinks short   # PipeWire/PulseAudio sinks
#
#  Look for your HDMI / receiver output, e.g. 'alsa/hdmi:CARD=HDMI,DEV=0'.
#
#  ── STEP 2: paste it below, and uncomment the block ──────────────────────────
#  Replace the example on the audio-device line, then delete the leading '#'
#  from ALL of the lines below (audio-device, ao, audio-channels,
#  audio-exclusive, audio-spdif, audio-buffer).
#
#  ── STEP 3: check it worked ──────────────────────────────────────────────────
#      ./mpv /path/to/some-movie.mkv
#  Your receiver's front panel should show the format (Atmos / TrueHD / DTS-HD).
#  In mpv, press `i` for the stats overlay — the audio line should say the codec
#  is being passed through rather than decoded to PCM.
#
#  Leave it all commented (the default) for normal PCM output through your usual
#  sound server — which is what you want if you don't have a receiver.
# ──────────────────────────────────────────────────────────────────────────────
#audio-device='alsa/hdmi:CARD=HDMI,DEV=0'   # <-- YOUR device. Required.
#ao=alsa
#audio-channels=7.1,5.1,stereo
#audio-exclusive=yes
#audio-spdif=ac3,dts,eac3,dts-hd,truehd
#audio-buffer=0.5

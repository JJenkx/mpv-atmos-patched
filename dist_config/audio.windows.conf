
# ══════════════════════════════════════════════════════════════════════════════
#  TrueHD / Atmos passthrough (Windows / WASAPI)  —  OFF until you set your device
# ══════════════════════════════════════════════════════════════════════════════
#  This is the whole point of this build: bitstream HD audio (TrueHD/Atmos MAT,
#  DTS-HD, E-AC3, AC3, DTS) untouched to an AVR / soundbar over HDMI.
#
#  ⚠  DO NOT just uncomment these lines. You MUST also set `audio-device` below.
#     WASAPI *exclusive* mode aimed at the wrong endpoint (your speakers, a DAC,
#     headphones...) will at best give you NO SOUND, and can lock up the audio
#     device. Passthrough to the system default output does not work anyway: your
#     AVR is almost never the default endpoint.
#
#  ── STEP 1: find your receiver's device name ─────────────────────────────────
#  Open PowerShell (or Command Prompt), change into the folder where you
#  unzipped mpv — the folder that contains mpv.exe — and list the audio devices:
#
#      cd "C:\path\to\mpv-atmos-enhanced-windows-x86_64"
#      .\mpv.com --audio-device=help
#
#  ▸ Use mpv.com, NOT mpv.exe.  mpv.exe is the windowed player and prints
#    nothing to the console; mpv.com is the same player with console output, so
#    it is the one that will actually show you the list.
#  ▸ Tip: in Explorer, Shift+Right-click the folder -> "Open PowerShell window
#    here" / "Open in Terminal" to skip typing the path.
#
#  You will get lines like:
#      'wasapi/{0.0.1.00000000}.{9a8b...}' (Denon-AVR (NVIDIA High Definition Audio))
#  Find the one that is your receiver / HDMI output and copy the whole
#  'wasapi/{...}' part, quotes included.
#
#  ── STEP 2: paste it below, and uncomment the block ──────────────────────────
#  Replace the example on the audio-device line, then delete the leading '#'
#  from ALL of the lines below (audio-device, ao, audio-channels,
#  audio-exclusive, audio-spdif, audio-buffer).
#
#  ── STEP 3: check it worked ──────────────────────────────────────────────────
#      .\mpv.com "C:\path\to\some-movie.mkv"
#  Your receiver's front panel should show the format (Atmos / TrueHD / DTS-HD).
#  In mpv, press `i` for the stats overlay — the audio line should say the codec
#  is being passed through rather than decoded to PCM.
#
#  Leave it all commented (the default) for normal shared-mode PCM output — which
#  is what you want if you don't have a receiver.
# ──────────────────────────────────────────────────────────────────────────────
#audio-device='wasapi/{0.0.1.00000000}.{replace-with-YOUR-guid}'   # <-- YOUR device. Required.
#ao=wasapi
#audio-channels=7.1,5.1,stereo
#audio-exclusive=yes
#audio-spdif=ac3,dts,eac3,dts-hd,truehd
#audio-buffer=0.5

# Windows has no system CA store, so HTTPS (normal streams + the segmented
# downloader) uses the bundled Mozilla CA bundle shipped next to this file.
tls-ca-file=~~/cacert.pem

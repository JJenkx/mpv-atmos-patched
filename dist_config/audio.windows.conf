
# ── TrueHD / Atmos passthrough (Windows / WASAPI) — OPTIONAL, off by default ───
# Uncomment this block to bitstream HD audio (TrueHD/Atmos MAT, DTS-HD, E-AC3,
# AC3, DTS) untouched to an AVR/soundbar over HDMI. WASAPI *exclusive* mode is
# required for untouched spdif/MAT bitstreaming. Leave it commented for normal
# shared-mode PCM output on ordinary speakers/headphones (the default).
#ao=wasapi
#audio-channels=7.1,5.1,stereo
# Pick YOUR audio output device, then uncomment audio-device. Find its mpv name:
#   mpv --audio-device=help    # every device mpv can see, e.g.
#                              # 'wasapi/{0.0.1.00000000}.{guid}' (your HDMI/AVR out)
# Leave commented to use the system default output.
#audio-device=
#audio-exclusive=yes
#audio-spdif=ac3,dts,eac3,dts-hd,truehd
#audio-buffer=0.5

# Windows has no system CA store, so HTTPS (normal streams + the segmented
# downloader) uses the bundled Mozilla CA bundle shipped next to this file.
tls-ca-file=~~/cacert.pem
